name: Release AAR

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Compute version from tag
        run: |
          echo "VERSION_NAME=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build release AAR into dist/
        run: ./gradlew :EXADPrinterLib:prepareReleaseArtifacts -PVERSION_NAME=${{ env.VERSION_NAME }}

      - name: Compute SHA-256 checksums
        run: |
          cd dist
          sha256sum *.aar > SHA256SUMS.txt

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.aar
            dist/SHA256SUMS.txt