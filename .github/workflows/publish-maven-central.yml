name: Publish to Maven Central (Central Portal)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Compute version from tag
        run: |
          echo "VERSION_NAME=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Publish to Sonatype staging (OSSRH compatibility)
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_mavenCentralUsername }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_mavenCentralPassword }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_signingInMemoryKey }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GRADLE_PROJECT_signingInMemoryKeyPassword }}
        run: |
          ./gradlew :EXADPrinterLib:publishReleasePublicationToMavenCentralRepository \
            -PVERSION_NAME=${{ env.VERSION_NAME }} \
            --no-daemon

      - name: Manual upload to Central Portal
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_mavenCentralUsername }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_mavenCentralPassword }}
          SONATYPE_NAMESPACE: ${{ secrets.SONATYPE_NAMESPACE }}
        run: |
          curl -i -u "${ORG_GRADLE_PROJECT_mavenCentralUsername}:${ORG_GRADLE_PROJECT_mavenCentralPassword}" \
            -X POST \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/${SONATYPE_NAMESPACE}"